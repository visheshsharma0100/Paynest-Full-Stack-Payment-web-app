<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayNest — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#7c6dfa;--accent2:#fa6d9e;--text:#f0f0f5;--muted:#6b6b80;--input-bg:#1a1a26;--success:#4ade80;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:0.08;pointer-events:none}
    .blob-1{width:500px;height:500px;background:var(--accent);top:-150px;left:-150px}
    .blob-2{width:400px;height:400px;background:var(--accent2);bottom:-100px;right:-100px}
    nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px}
    .nav-logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s}
    .logout-btn:hover{border-color:var(--accent2);color:var(--accent2)}
    main{max-width:680px;margin:0 auto;padding:32px 20px}
    .balance-card{background:linear-gradient(135deg,#1a1535,#1e1228);border:1px solid rgba(124,109,250,0.2);border-radius:24px;padding:32px;margin-bottom:28px;position:relative;overflow:hidden;animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both}
    .balance-card::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(124,109,250,0.15),transparent 70%);pointer-events:none}
    .balance-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
    .balance-amount{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;letter-spacing:-2px;line-height:1}
    .balance-amount .currency{font-size:24px;vertical-align:super;margin-right:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .balance-sub{color:var(--muted);font-size:13px;margin-top:8px}
    .section-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;color:var(--text)}
    .search-wrap{position:relative;margin-bottom:20px;animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.1s both}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
    #searchInput{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 14px 13px 42px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
    #searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,109,250,0.12)}
    #searchInput::placeholder{color:var(--muted)}
    .users-list{display:flex;flex-direction:column;gap:10px;animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.15s both}
    .user-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.2s,transform 0.15s}
    .user-card:hover{border-color:rgba(124,109,250,0.3);transform:translateX(3px)}
    .user-left{display:flex;align-items:center;gap:14px}
    .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;flex-shrink:0}
    .user-name{font-weight:500;font-size:15px}
    .user-email{font-size:12px;color:var(--muted);margin-top:2px}
    .send-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:white;padding:9px 18px;border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;white-space:nowrap}
    .send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(124,109,250,0.4)}
    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:14px;height:70px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <nav>
    <div class="nav-logo">Pay<span>Nest</span></div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </nav>
  <main>
    <div class="balance-card">
      <div class="balance-label">Your Balance</div>
      <div class="balance-amount">
        <span class="currency">₹</span><span id="balanceAmt">—</span>
      </div>
      <div class="balance-sub" id="balanceSub">Loading your balance...</div>
    </div>
    <div class="section-title">Send Money</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search users by name..." oninput="handleSearch()" />
    </div>
    <div class="users-list" id="usersList">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </main>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/signin';

    let searchTimeout;

    async function loadBalance() {
      try {
        const res = await fetch('http://localhost:3000/account/balance', { headers: { token } });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('balanceAmt').textContent = data.balance.toLocaleString('en-IN');
          document.getElementById('balanceSub').textContent = 'Available to transfer';
        } else {
          document.getElementById('balanceSub').textContent = 'Could not load balance';
        }
      } catch {
        document.getElementById('balanceSub').textContent = 'Server not reachable';
      }
    }

    async function loadUsers(filter = '') {
      const list = document.getElementById('usersList');
      try {
        const res = await fetch(`http://localhost:3000/user/bulk?filter=${filter}`, { headers: { token } });
        const data = await res.json();
        renderUsers(data.users || []);
      } catch {
        list.innerHTML = '<div class="empty">Could not load users</div>';
      }
    }

    function renderUsers(users) {
      const list = document.getElementById('usersList');
      if (!users.length) { list.innerHTML = '<div class="empty">No users found</div>'; return; }
      list.innerHTML = users.map(u => `
        <div class="user-card">
          <div class="user-left">
            <div class="avatar">${u.firstName[0].toUpperCase()}</div>
            <div>
              <div class="user-name">${u.firstName} ${u.lastName}</div>
              <div class="user-email">${u.username || ''}</div>
            </div>
          </div>
          <button class="send-btn" onclick="goToSend('${u._id}', '${u.firstName} ${u.lastName}')">Send ₹</button>
        </div>
      `).join('');
    }

    function handleSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => loadUsers(document.getElementById('searchInput').value), 300);
    }

    function goToSend(userId, name) {
      localStorage.setItem('sendTo', userId);
      localStorage.setItem('sendToName', name);
      window.location.href = '/send';
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/signin';
    }

    loadBalance();
    loadUsers();
  </script>
</body>
</html>
