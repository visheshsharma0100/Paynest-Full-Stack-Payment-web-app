<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayNest — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --accent: #7c6dfa;
      --accent2: #fa6d9e;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --input-bg: #1a1a26;
      --success: #4ade80;
      --error: #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 8s ease-in-out infinite;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 3s; }
    .blob-3 { width: 200px; height: 200px; background: #6dfad3; top: 50%; left: 50%; animation-delay: 5s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 20px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: -1px;
    }
    .logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      margin-bottom: 16px;
      animation: fadeIn 0.4s ease both;
    }
    .field:nth-child(1) { animation-delay: 0.1s; }
    .field:nth-child(2) { animation-delay: 0.15s; }
    .field:nth-child(3) { animation-delay: 0.2s; }
    .field:nth-child(4) { animation-delay: 0.25s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 109, 250, 0.15);
    }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.3px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(124, 109, 250, 0.4); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn .loader {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn.loading .btn-text { display: none; }
    .btn.loading .loader { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .toast.error { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .toast.success { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }

    .signin-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }
    .signin-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .signin-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="logo">Pay<span>Nest</span></div>

    <div class="card">
      <div class="card-title">Create account</div>
      <div class="card-sub">Join thousands sending money instantly</div>

      <div class="row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="Rahul" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="Sharma" />
        </div>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="username" placeholder="rahul@gmail.com" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 3 characters" />
      </div>

      <button class="btn" id="signupBtn" onclick="handleSignup()">
        <span class="btn-text">Create Account</span>
        <div class="loader"></div>
      </button>

      <div class="toast" id="toast"></div>
    </div>

    <div class="signin-link">
      Already have an account? <a href="/user/signin">Sign in</a>
    </div>
  </div>

  <script>
    async function handleSignup() {
      const btn = document.getElementById('signupBtn');
      const toast = document.getElementById('toast');
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!firstName || !lastName || !username || !password) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      toast.style.display = 'none';

      try {
        const res = await fetch('http://localhost:3000/user/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, firstName, lastName })
        });
        const data = await res.json();

        if (res.ok) {
          showToast('Account created! Redirecting...', 'success');
          setTimeout(() => window.location.href = "/user/signin", 1500);
        } else {
          showToast(data.message || 'Something went wrong', 'error');
        }
      } catch (e) {
        showToast('Cannot connect to server', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type}`;
      toast.style.display = 'block';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignup();
    });
  </script>
</body>
</html>
